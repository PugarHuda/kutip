[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.26"
optimizer = true
optimizer_runs = 200
via_ir = true
evm_version = "cancun"

[rpc_endpoints]
kite_testnet = "${KITE_RPC_URL}"

[etherscan]
kite_testnet = { key = "${KITESCAN_API_KEY}", url = "https://testnet.kitescan.ai/api" }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true

[fuzz]
runs = 256
