# Attestation — one row per QueryAttested event. Named Attestation (not Query)
# because `Query` collides with GraphQL's reserved root type name.
type Attestation @entity(immutable: false) {
  id: Bytes!                    # queryId (bytes32)
  payer: Bytes!                 # AA or EOA that submitted attestAndSplit
  totalPaid: BigInt!            # in token's smallest unit (18-dec on Kite)
  authorsShare: BigInt!
  citationCount: Int!
  block: BigInt!
  timestamp: BigInt!
  tx: Bytes!
  citations: [Citation!]! @derivedFrom(field: "attestation")
}

type Citation @entity(immutable: true) {
  id: String!                   # {txHash}-{logIndex}
  attestation: Attestation!
  author: Author!
  weightBps: Int!
  amount: BigInt!               # USDC paid to author on this cite (18-dec)
  block: BigInt!
  timestamp: BigInt!
  tx: Bytes!
}

type Author @entity(immutable: false) {
  id: Bytes!                    # wallet address, lowercase
  totalEarnings: BigInt!
  citationCount: Int!
  firstSeenAt: BigInt!
  lastSeenAt: BigInt!
  citations: [Citation!]! @derivedFrom(field: "author")
}

type DayStat @entity(immutable: false) {
  id: String!                   # "YYYY-MM-DD" UTC
  date: BigInt!                 # midnight UTC unix
  queriesAttested: Int!
  citationsPaid: Int!
  totalPaid: BigInt!
}

type AuthorDayStat @entity(immutable: false) {
  id: String!                   # "{wallet}-YYYY-MM-DD"
  author: Author!
  date: BigInt!
  citations: Int!
  earnings: BigInt!
}
